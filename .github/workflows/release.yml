name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create the GitHub Release as a draft instead of publishing it immediately'
        type: boolean
        default: false
      publish_npm:
        description: 'Publish package to npm after installers are attached'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
      tag: ${{ steps.package.outputs.tag }}
      prerelease: ${{ steps.package.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install Linux desktop test dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install dependencies
        run: npm ci
      - name: Check
        run: xvfb-run -a npm run check
      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify package metadata and tag
        run: npm run release:check

  build-windows:
    name: Build Windows installer
    needs: preflight
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      WINDOWS_AZURE_SIGNING: ${{ vars.WINDOWS_AZURE_SIGNING }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
      AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify Windows signing env
        if: vars.REQUIRE_WINDOWS_SIGNING == 'true'
        run: npm run release:check -- --target win
      - name: Build
        run: npm run dist:win -- --publish never
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest*.yml

  build-macos:
    name: Build macOS installer
    needs: preflight
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      MAC_NOTARIZE: ${{ vars.MAC_NOTARIZE }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify macOS signing and notarization env
        if: vars.REQUIRE_MAC_SIGNING == 'true'
        run: npm run release:check -- --target mac
      - name: Prepare App Store Connect API key
        if: env.APPLE_API_KEY_BASE64 != ''
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/appstore-connect"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/appstore-connect/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/appstore-connect/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"
      - name: Build
        run: npm run dist:mac -- --publish never
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml

  build-linux:
    name: Build Linux packages
    needs: preflight
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run dist:linux -- --publish never
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.blockmap
            release/latest*.yml

  publish-github-release:
    name: Attach installers to GitHub Release
    needs: [preflight, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: YOLO Auto Desktop ${{ needs.preflight.outputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == true }}
          prerelease: ${{ needs.preflight.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.prerelease == 'true' && 'false' || 'true' }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.blockmap
            artifacts/**/*.yml
          fail_on_unmatched_files: true

  publish-npm:
    name: Publish npm package
    needs: publish-github-release
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && inputs.publish_npm == true) || vars.PUBLISH_NPM == 'true'
    environment: npm-production
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify npm publish env
        run: npm run release:check -- --target npm
      - name: Publish to npm with provenance
        shell: bash
        run: |
          NPM_TAG=$(node -e "const v=require('./package.json').version; console.log(v.includes('-') ? 'next' : 'latest')")
          npm publish --provenance --access public --tag "$NPM_TAG"
